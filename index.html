<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biglietto treno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="stylesheets/index.css">
</head>

<body>
    <form id="train-form" action="" class="my-container">
        <input required id="input-distanza" type="text" placeholder="distanza da percorrere" name="distanza">
        <input required id="input-eta" type="text" placeholder="età" name="età">
        <button type="submit" id="btn-biglietto">Stampa biglietto</button>
    </form>
    <div class="container mt-5 mb-5 biglietto-card d-none">
        <div class="row">
            <div class="col-3">
                <div>
                    <img id="logo-treno" src="https://www.travelquotidiano.com/wp-content/uploads/2016/03/Trenitalia.png" alt="logo frecciarossa">
                </div>
            </div>
            <div class="col-3 biglietto-section">
                <h5>PASSEGGERO</h5>
                <p>Giorgio Torricelli</p>
            </div>
            <div class="col-3 biglietto-section">
                <h5>PREZZO</h5>
                <p id="final-price"></p>
            </div>
            <div class="col-3 biglietto-section">
                <h5>NUMERO</h5>
                <p>YC475P</p>
            </div>
        </div>
    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="scripts/index.js"></script>
</body>

</html>
